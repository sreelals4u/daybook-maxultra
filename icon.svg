<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e293b" />
      <stop offset="100%" stop-color="#0f172a" />
    </linearGradient>
    
    <linearGradient id="gold-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fcd34d" />
      <stop offset="50%" stop-color="#f59e0b" />
      <stop offset="100%" stop-color="#b45309" />
    </linearGradient>

    <linearGradient id="blue-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#93c5fd" />
      <stop offset="50%" stop-color="#3b82f6" />
      <stop offset="100%" stop-color="#1d4ed8" />
    </linearGradient>

    <filter id="shadow" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="0" dy="12" stdDeviation="15" flood-color="#000000" flood-opacity="0.4"/>
    </filter>
  </defs>

  <rect width="512" height="512" rx="110" fill="url(#bg-grad)" />
  
  <rect width="470" height="470" x="21" y="21" rx="90" fill="none" stroke="rgba(255,255,255,0.05)" stroke-width="4" />

  <g filter="url(#shadow)">
    <path d="M 230 350 L 230 180 L 290 260 L 350 180 L 350 350" fill="none" stroke="url(#blue-grad)" stroke-width="45" stroke-linecap="round" stroke-linejoin="round" />
    
    <path d="M 150 160 L 150 350 L 200 350 C 260 350 300 310 300 255 C 300 200 260 160 200 160 Z" fill="none" stroke="url(#gold-grad)" stroke-width="45" stroke-linecap="round" stroke-linejoin="round" />
  </g>
</svg>
